<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store 诊断</title>
<style>
body { font-family: monospace; padding: 20px; background: #1a1a2e; color: #e0e0e0; }
.card { background: #16213e; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
h2 { color: #0f3460; border-bottom: 1px solid #333; padding-bottom: 8px; }
.ok { color: #52c41a; }
.err { color: #ff4d4f; }
.warn { color: #faad14; }
pre { white-space: pre-wrap; word-break: break-all; font-size: 13px; }
button { background: #1677ff; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; margin: 4px; }
button.danger { background: #ff4d4f; }
</style>
</head>
<body>
<h1>Store 数据诊断</h1>
<div id="result"></div>
<button onclick="location.href='/'">返回首页</button>
<button class="danger" onclick="if(confirm('确定清除所有数据？')){localStorage.clear();location.reload();}">清空所有数据</button>
<button onclick="testQuickRecord()">测试写入一笔交易</button>

<script>
const el = document.getElementById('result');

const KEYS = {
  transactions: 'accounting_transactions',
  accounts: 'accounting_accounts',
  auth: 'accounting_auth',
  seeded: 'accounting_seeded',
  budgets: 'accounting_budgets',
  categories: 'accounting_categories',
  settings: 'accounting_settings',
};

function section(title, content, status) {
  const cls = status === 'ok' ? 'ok' : status === 'err' ? 'err' : '';
  return `<div class="card"><h2 class="${cls}">${title}</h2><pre>${content}</pre></div>`;
}

function check() {
  let html = '';
  
  // 检查每个key
  for (const [name, key] of Object.entries(KEYS)) {
    try {
      const raw = localStorage.getItem(key);
      if (raw) {
        const data = JSON.parse(raw);
        if (name === 'transactions') {
          // zustand persist 格式：{ state: { transactions: [...] }, version: N }
          const txs = data?.state?.transactions || data;
          const count = Array.isArray(txs) ? txs.length : 0;
          html += section(`${name} (${key})`, `记录数: ${count}\n${JSON.stringify(txs?.slice(0,3) || [], null, 2)}`, count > 0 ? 'ok' : 'err');
        } else if (name === 'accounts') {
          const accts = data?.state?.accounts || data;
          const count = Array.isArray(accts) ? accts.length : 0;
          html += section(`${name} (${key})`, `账户数: ${count}\n${JSON.stringify(accts?.slice(0,3) || [], null, 2)}`, count > 0 ? 'ok' : 'warn');
        } else if (name === 'auth') {
          const user = data?.state?.user || data?.user || data;
          html += section(`${name} (${key})`, `登录状态: ${user ? JSON.stringify(user) : '未登录'}`, user ? 'ok' : 'warn');
        } else {
          html += section(`${name} (${key})`, JSON.stringify(data, null, 2).substring(0, 500), 'ok');
        }
      } else {
        html += section(`${name} (${key})`, '(空)', 'err');
      }
    } catch (e) {
      html += section(`${name} (${key})`, `读取失败: ${e.message}`, 'err');
    }
  }

  // 检查所有localStorage keys
  const allKeys = Object.keys(localStorage);
  html += section(`所有 localStorage keys (${allKeys.length})`, allKeys.join('\n'), '');

  el.innerHTML = html;
}

function testQuickRecord() {
  try {
    // 直接操作 zustand persist 的数据
    const txKey = KEYS.transactions;
    const raw = localStorage.getItem(txKey);
    const parsed = raw ? JSON.parse(raw) : { state: { transactions: [] }, version: 0 };
    const txs = parsed.state?.transactions || [];
    
    const newTx = {
      id: 'diag-' + Date.now(),
      date: new Date().toISOString().slice(0, 10),
      time: new Date().toISOString().slice(11, 16),
      direction: 'expense',
      amount: 1.23,
      accountId: 'diag',
      category: '餐饮美食',
      subCategory: '午餐',
      remark: '诊断测试记录',
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString(),
    };
    
    txs.unshift(newTx);
    
    if (parsed.state) {
      parsed.state.transactions = txs;
    }
    localStorage.setItem(txKey, JSON.stringify(parsed));
    
    alert('已写入测试记录，请刷新后查看');
    location.reload();
  } catch (e) {
    alert('写入失败: ' + e.message);
  }
}

check();
</script>
</body>
</html>
